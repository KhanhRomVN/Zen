<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attribute Normalization Test</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: #1e1e1e;
      color: #d4d4d4;
    }
    h1 {
      color: #4ec9b0;
      border-bottom: 2px solid #4ec9b0;
      padding-bottom: 10px;
    }
    .test-case {
      margin: 20px 0;
      padding: 15px;
      background: #252526;
      border-left: 4px solid #007acc;
      border-radius: 4px;
    }
    .test-title {
      color: #dcdcaa;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .input, .output, .expected {
      margin: 10px 0;
      padding: 10px;
      border-radius: 4px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .input {
      background: #2d2d30;
      border: 1px solid #3e3e42;
    }
    .output {
      background: #1e3a1e;
      border: 1px solid #2d5a2d;
    }
    .expected {
      background: #1e1e3a;
      border: 1px solid #2d2d5a;
    }
    .label {
      color: #9cdcfe;
      font-size: 12px;
      margin-bottom: 5px;
    }
    .pass {
      color: #4ec9b0;
      font-weight: bold;
    }
    .fail {
      color: #f48771;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>🧪 Attribute Normalization Test</h1>
  
  <div id="results"></div>

  <script type="module">
    // Simple mock of TOOL_REGISTRY for testing
    const TOOL_REGISTRY = {
      read_file: {
        type: "read_file",
        attributeAliases: {
          path: ["filePath", "file_path", "FilePath", "File_Path", "FILE_PATH", "filepath"],
        },
      },
      write_to_file: {
        type: "write_to_file",
        attributeAliases: {
          path: ["filePath", "file_path", "FilePath", "File_Path", "FILE_PATH", "filepath"],
        },
      },
    };

    // Simplified normalization logic for testing
    function normalizeAttributesInToolContent(toolType, content) {
      const aliases = TOOL_REGISTRY[toolType]?.attributeAliases ?? {};
      if (Object.keys(aliases).length === 0) return content;

      let result = content;
      
      for (const [canonical, variants] of Object.entries(aliases)) {
        if (variants.length === 0) continue;
        
        const escaped = variants.map(v => v.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"));
        const pattern = new RegExp(
          `<(\\/?)(${escaped.join("|")})(\\s[^>]*)?\\s*>`,
          "gi"
        );
        
        result = result.replace(
          pattern,
          (_match, slash, _attrName, attrs) =>
            `<${slash}${canonical}${attrs ?? ""}>`
        );
      }
      
      return result;
    }

    function normalizeTagVariants(content) {
      let result = content;

      // Normalize attributes within each tool tag
      for (const [toolType, def] of Object.entries(TOOL_REGISTRY)) {
        if (!def.attributeAliases || Object.keys(def.attributeAliases).length === 0) {
          continue;
        }
        
        const toolPattern = new RegExp(
          `<${toolType}>([\\s\\S]*?)<\\/${toolType}>`,
          "gi"
        );
        
        result = result.replace(toolPattern, (match, innerContent) => {
          const normalized = normalizeAttributesInToolContent(toolType, innerContent);
          return `<${toolType}>${normalized}</${toolType}>`;
        });
      }

      return result;
    }

    // Test cases
    const testCases = [
      {
        name: "Test 1: <filePath> → <path>",
        input: "<read_file><filePath>src/main.ts</filePath></read_file>",
        expected: "<read_file><path>src/main.ts</path></read_file>",
      },
      {
        name: "Test 2: <file_path> → <path>",
        input: "<read_file><file_path>src/main.ts</file_path></read_file>",
        expected: "<read_file><path>src/main.ts</path></read_file>",
      },
      {
        name: "Test 3: <FilePath> → <path>",
        input: "<read_file><FilePath>src/main.ts</FilePath></read_file>",
        expected: "<read_file><path>src/main.ts</path></read_file>",
      },
      {
        name: "Test 4: <FILE_PATH> → <path>",
        input: "<read_file><FILE_PATH>src/main.ts</FILE_PATH></read_file>",
        expected: "<read_file><path>src/main.ts</path></read_file>",
      },
      {
        name: "Test 5: Multiple attributes in write_to_file",
        input: "<write_to_file><filePath>test.ts</filePath><content>hello</content></write_to_file>",
        expected: "<write_to_file><path>test.ts</path><content>hello</content></write_to_file>",
      },
      {
        name: "Test 6: Mixed case variants",
        input: "<read_file><filepath>test.js</filepath></read_file>",
        expected: "<read_file><path>test.js</path></read_file>",
      },
    ];

    // Run tests
    const resultsContainer = document.getElementById('results');
    
    testCases.forEach((test, index) => {
      const output = normalizeTagVariants(test.input);
      const passed = output === test.expected;
      
      const testDiv = document.createElement('div');
      testDiv.className = 'test-case';
      testDiv.innerHTML = `
        <div class="test-title">${test.name}</div>
        <div class="label">Input:</div>
        <div class="input">${escapeHtml(test.input)}</div>
        <div class="label">Expected:</div>
        <div class="expected">${escapeHtml(test.expected)}</div>
        <div class="label">Output:</div>
        <div class="output">${escapeHtml(output)}</div>
        <div style="margin-top: 10px;">
          Status: <span class="${passed ? 'pass' : 'fail'}">${passed ? '✅ PASS' : '❌ FAIL'}</span>
        </div>
      `;
      
      resultsContainer.appendChild(testDiv);
    });

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Summary
    const passed = testCases.filter((test, i) => 
      normalizeTagVariants(test.input) === test.expected
    ).length;
    
    const summary = document.createElement('div');
    summary.style.cssText = 'margin-top: 30px; padding: 20px; background: #252526; border-radius: 4px; text-align: center; font-size: 18px;';
    summary.innerHTML = `
      <strong>Test Summary:</strong> 
      <span class="${passed === testCases.length ? 'pass' : 'fail'}">
        ${passed}/${testCases.length} tests passed
      </span>
    `;
    resultsContainer.appendChild(summary);
  </script>
</body>
</html>
