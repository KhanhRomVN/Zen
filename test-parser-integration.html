<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parser Integration Test</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
      background: #1e1e1e;
      color: #d4d4d4;
    }
    h1 {
      color: #4ec9b0;
      border-bottom: 2px solid #4ec9b0;
      padding-bottom: 10px;
    }
    .test-case {
      margin: 20px 0;
      padding: 15px;
      background: #252526;
      border-left: 4px solid #007acc;
      border-radius: 4px;
    }
    .test-title {
      color: #dcdcaa;
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 16px;
    }
    .input, .output {
      margin: 10px 0;
      padding: 10px;
      border-radius: 4px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .input {
      background: #2d2d30;
      border: 1px solid #3e3e42;
    }
    .output {
      background: #1e3a1e;
      border: 1px solid #2d5a2d;
    }
    .label {
      color: #9cdcfe;
      font-size: 12px;
      margin-bottom: 5px;
    }
    .pass {
      color: #4ec9b0;
      font-weight: bold;
    }
    .fail {
      color: #f48771;
      font-weight: bold;
    }
    .section {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 2px solid #3e3e42;
    }
    .section-title {
      color: #569cd6;
      font-size: 20px;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <h1>🧪 Complete Parser Integration Test</h1>
  
  <div id="results"></div>

  <script type="module">
    // Mock extractParam and extractParamValue
    function extractParamValue(content, paramName) {
      const regex = new RegExp(`<${paramName}>([\\s\\S]*?)<\\/${paramName}>`, "i");
      const match = content.match(regex);
      return match ? match[1].trim() : null;
    }

    function extractParam(content, ...aliases) {
      for (const alias of aliases) {
        const value = extractParamValue(content, alias);
        if (value !== null && value !== "") return value;
      }
      return null;
    }

    // Mock TOOL_REGISTRY
    const TOOL_REGISTRY = {
      read_file: {
        attributeAliases: {
          path: ["filePath", "file_path", "FilePath", "filepath"],
        },
      },
    };

    // Simplified normalizeAttributesInToolContent
    function normalizeAttributesInToolContent(toolType, content) {
      const aliases = TOOL_REGISTRY[toolType]?.attributeAliases ?? {};
      if (Object.keys(aliases).length === 0) return content;

      let result = content;
      
      for (const [canonical, variants] of Object.entries(aliases)) {
        if (variants.length === 0) continue;
        
        const escaped = variants.map(v => v.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"));
        const pattern = new RegExp(
          `<(\\/?)(${escaped.join("|")})(\\s[^>]*)?\\s*>`,
          "gi"
        );
        
        result = result.replace(
          pattern,
          (_match, slash, _attrName, attrs) =>
            `<${slash}${canonical}${attrs ?? ""}>`
        );
      }
      
      return result;
    }

    // Simplified normalizeTagVariants
    function normalizeTagVariants(content) {
      let result = content;

      for (const [toolType, def] of Object.entries(TOOL_REGISTRY)) {
        if (!def.attributeAliases || Object.keys(def.attributeAliases).length === 0) {
          continue;
        }
        
        const toolPattern = new RegExp(
          `<${toolType}>([\\s\\S]*?)<\\/${toolType}>`,
          "gi"
        );
        
        result = result.replace(toolPattern, (match, innerContent) => {
          const normalized = normalizeAttributesInToolContent(toolType, innerContent);
          return `<${toolType}>${normalized}</${toolType}>`;
        });
      }

      return result;
    }

    // Mock parseReadFile (updated version)
    function parseReadFile(innerContent) {
      const filePath = extractParam(innerContent, "path", "file_path", "filePath", "filepath");
      const startLine = extractParamValue(innerContent, "start_line");
      const endLine = extractParamValue(innerContent, "end_line");

      return {
        file_path: filePath || "",
        start_line: startLine ? parseInt(startLine, 10) : undefined,
        end_line: endLine ? parseInt(endLine, 10) : undefined,
      };
    }

    // Test cases
    const testCases = [
      {
        section: "Original Issue - filePath variant",
        name: "Test 1: <filePath> + other attributes",
        input: "<read_file><filePath>src/main/app-launcher.ts</filePath><start_line>180</start_line><end_line>500</end_line></read_file>",
        expected: {
          file_path: "src/main/app-launcher.ts",
          start_line: 180,
          end_line: 500,
        },
      },
      {
        section: "Original Issue - filePath variant",
        name: "Test 2: <file_path> + other attributes",
        input: "<read_file><file_path>src/main/app-launcher.ts</file_path><start_line>180</start_line><end_line>500</end_line></read_file>",
        expected: {
          file_path: "src/main/app-launcher.ts",
          start_line: 180,
          end_line: 500,
        },
      },
      {
        section: "Canonical form (after normalization)",
        name: "Test 3: <path> (canonical)",
        input: "<read_file><path>src/main/app-launcher.ts</path><start_line>180</start_line><end_line>500</end_line></read_file>",
        expected: {
          file_path: "src/main/app-launcher.ts",
          start_line: 180,
          end_line: 500,
        },
      },
      {
        section: "Edge cases",
        name: "Test 4: Mixed case <FilePath>",
        input: "<read_file><FilePath>test.ts</FilePath></read_file>",
        expected: {
          file_path: "test.ts",
          start_line: undefined,
          end_line: undefined,
        },
      },
      {
        section: "Edge cases",
        name: "Test 5: <filepath> (lowercase, no underscore)",
        input: "<read_file><filepath>test.js</filepath><start_line>1</start_line></read_file>",
        expected: {
          file_path: "test.js",
          start_line: 1,
          end_line: undefined,
        },
      },
    ];

    // Run tests
    const resultsContainer = document.getElementById('results');
    let currentSection = null;
    
    testCases.forEach((test) => {
      // Add section header if new section
      if (test.section !== currentSection) {
        currentSection = test.section;
        const sectionDiv = document.createElement('div');
        sectionDiv.className = 'section';
        sectionDiv.innerHTML = `<div class="section-title">📦 ${test.section}</div>`;
        resultsContainer.appendChild(sectionDiv);
      }

      // Normalize and parse
      const normalized = normalizeTagVariants(test.input);
      const innerContent = normalized.match(/<read_file>([\s\S]*?)<\/read_file>/i)?.[1] || "";
      const output = parseReadFile(innerContent);
      
      // Compare
      const passed = JSON.stringify(output) === JSON.stringify(test.expected);
      
      const testDiv = document.createElement('div');
      testDiv.className = 'test-case';
      testDiv.innerHTML = `
        <div class="test-title">${test.name}</div>
        <div class="label">Original Input:</div>
        <div class="input">${escapeHtml(test.input)}</div>
        <div class="label">After Normalization:</div>
        <div class="input">${escapeHtml(normalized)}</div>
        <div class="label">Parsed Output:</div>
        <div class="output">${escapeHtml(JSON.stringify(output, null, 2))}</div>
        <div class="label">Expected:</div>
        <div class="output">${escapeHtml(JSON.stringify(test.expected, null, 2))}</div>
        <div style="margin-top: 10px;">
          Status: <span class="${passed ? 'pass' : 'fail'}">${passed ? '✅ PASS' : '❌ FAIL'}</span>
        </div>
      `;
      
      resultsContainer.appendChild(testDiv);
    });

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Summary
    const passed = testCases.filter((test) => {
      const normalized = normalizeTagVariants(test.input);
      const innerContent = normalized.match(/<read_file>([\s\S]*?)<\/read_file>/i)?.[1] || "";
      const output = parseReadFile(innerContent);
      return JSON.stringify(output) === JSON.stringify(test.expected);
    }).length;
    
    const summary = document.createElement('div');
    summary.style.cssText = 'margin-top: 30px; padding: 20px; background: #252526; border-radius: 4px; text-align: center; font-size: 18px;';
    summary.innerHTML = `
      <strong>Test Summary:</strong> 
      <span class="${passed === testCases.length ? 'pass' : 'fail'}">
        ${passed}/${testCases.length} tests passed
      </span>
    `;
    resultsContainer.appendChild(summary);
  </script>
</body>
</html>
